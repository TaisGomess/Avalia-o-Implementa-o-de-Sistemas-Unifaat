version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: avaliacao_cloud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - avaliacao-network

  api:
    build: ./api
    container_name: api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - avaliacao-network

  web:
    build: ./web
    container_name: web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - avaliacao-network

volumes:
  postgres_data:

networks:
  avaliacao-network:
    driver: bridge